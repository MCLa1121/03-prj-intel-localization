<script>
  /*
    Auto RTL / LTR detection script

    This checks the page language.
    If Google Translate changes the page to Arabic, Hebrew, Persian, Urdu,
    or another RTL language, the page automatically switches to RTL.

    If the page changes back to English or another LTR language,
    it switches back to LTR.
  */

  function updateDirectionFromLanguage() {
    const rtlLanguages = ["ar", "he", "fa", "ur"];

    // Get the current page language
    const currentLang = document.documentElement.lang || "";

    // Check if the language starts with an RTL language code
    const isRTL = rtlLanguages.some(function(lang) {
      return currentLang.toLowerCase().startsWith(lang);
    });

    if (isRTL) {
      document.documentElement.setAttribute("dir", "rtl");
      document.body.classList.add("rtl-mode");
    } else {
      document.documentElement.setAttribute("dir", "ltr");
      document.body.classList.remove("rtl-mode");
    }
  }

  // Run once when the page loads
  updateDirectionFromLanguage();

  // Watch for changes to the html lang attribute
  const languageObserver = new MutationObserver(updateDirectionFromLanguage);

  languageObserver.observe(document.documentElement, {
    attributes: true,
    attributeFilter: ["lang"]
  });
</script>
